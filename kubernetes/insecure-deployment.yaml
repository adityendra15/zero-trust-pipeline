# Intentionally insecure: used only for the failing interview demonstration.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insecure-demo
  template:
    metadata:
      labels:
        app: insecure-demo
    spec:
      containers:
        - name: insecure
          image: nginx:latest
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
