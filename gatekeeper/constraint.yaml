apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredSecurityControls
metadata:
  name: workloads-must-run-as-non-root
spec:
  enforcementAction: deny
  match:
    excludedNamespaces:
      - gatekeeper-system
      - kube-system
      - kube-public
      - kube-node-lease
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
